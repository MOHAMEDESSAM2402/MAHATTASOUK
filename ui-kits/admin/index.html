<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Souk Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../assets/icons.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:#F5F5F5; direction:rtl; min-height:100vh; }
input, select, textarea { font-family:inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = {
  purple:'#7F77DD', pink:'#D4537E', text:'#1A1A1A', text2:'#6B7280', text3:'#9CA3AF',
  bg:'#FFFFFF', bgGray:'#F5F5F5', border:'#E5E7EB',
  success:'#1D9E75', warning:'#F59E0B', error:'#E24B4A', info:'#3B82F6',
};
const grad = 'linear-gradient(135deg,#7F77DD,#D4537E)';

// ── Sidebar ──────────────────────────────────────
function Sidebar({ active, onNav }) {
  const items = [
    { id:'dashboard',  icon:'grid',     label:'لوحة التحكم' },
    { id:'banners',    icon:'banner',   label:'البنرات الإعلانية' },
    { id:'sellers',    icon:'store',    label:'البائعون' },
    { id:'products',   icon:'box',      label:'المنتجات' },
    { id:'orders',     icon:'receipt',  label:'الطلبات' },
    { id:'finance',    icon:'wallet',   label:'المالية' },
    { id:'promotions', icon:'gift',     label:'العروض والكوبونات' },
    { id:'inventory',  icon:'chart',    label:'المخزون' },
    { id:'settings',   icon:'cog',      label:'الإعدادات' },
  ];
  return (
    <div style={{width:228,background:'#1A1A2E',height:'100vh',display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0}}>
      <div style={{padding:'20px 18px 16px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{fontSize:22,fontWeight:900,background:grad,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>سوق</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:2}}>لوحة الإدارة</div>
      </div>
      <nav style={{flex:1,padding:'10px 10px',overflowY:'auto'}}>
        {items.map(item => (
          <div key={item.id} onClick={() => onNav(item.id)} style={{display:'flex',alignItems:'center',gap:11,padding:'10px 12px',borderRadius:10,cursor:'pointer',marginBottom:2,background:active===item.id?'rgba(127,119,221,0.22)':'transparent',transition:'all 0.15s',color:active===item.id?'#B4AFF2':'rgba(255,255,255,0.65)'}}>
            <Icon name={item.icon} size={18}/>
            <span style={{fontSize:13,fontWeight:active===item.id?700:500}}>{item.label}</span>
            {active===item.id && <div style={{marginRight:'auto',width:3,height:16,borderRadius:2,background:grad}}/>}
          </div>
        ))}
      </nav>
      <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:34,height:34,borderRadius:999,background:grad,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><Icon name="user" size={18}/></div>
        <div><div style={{fontSize:12,fontWeight:700,color:'#fff'}}>المدير العام</div><div style={{fontSize:10,color:'rgba(255,255,255,0.4)'}}>admin@souk.sa</div></div>
      </div>
    </div>
  );
}

function TopBar({ title }) {
  return (
    <div style={{height:60,background:'#fff',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',flexShrink:0}}>
      <div style={{fontSize:17,fontWeight:800,color:C.text}}>{title}</div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button style={{background:'#F5F5F5',border:'none',borderRadius:10,width:38,height:38,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.text2}}><Icon name="search" size={18}/></button>
        <button style={{background:'#F5F5F5',border:'none',borderRadius:10,width:38,height:38,cursor:'pointer',position:'relative',display:'flex',alignItems:'center',justifyContent:'center',color:C.text2}}>
          <Icon name="bell" size={18}/><span style={{position:'absolute',top:8,left:8,width:8,height:8,borderRadius:999,background:C.pink,border:'2px solid #fff'}}/>
        </button>
        <div style={{width:36,height:36,borderRadius:999,background:grad,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><Icon name="user" size={16}/></div>
      </div>
    </div>
  );
}

function KpiCard({ label, value, change, positive, icon }) {
  return (
    <div style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,padding:'18px 20px',flex:1}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:13,color:C.text2,fontWeight:600}}>{label}</div>
        <div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,rgba(127,119,221,0.12),rgba(212,83,126,0.12))',display:'flex',alignItems:'center',justifyContent:'center',color:C.purple}}><Icon name={icon} size={18}/></div>
      </div>
      <div style={{fontSize:26,fontWeight:900,color:C.text,lineHeight:1}}>{value}</div>
      {change && <div style={{fontSize:12,color:positive?C.success:C.error,fontWeight:600,marginTop:6}}>{positive?'↑':'↓'} {change}</div>}
    </div>
  );
}

function StatusBadge({ status }) {
  const map = {
    'معلق':['#FEF3C7','#92400E'], 'قيد المعالجة':['#DBEAFE','#1E40AF'],
    'مشحون':['#D1FAE5','#065F46'], 'ملغي':['#FEE2E2','#991B1B'],
    'نشط':['#D1FAE5','#065F46'], 'موقوف':['#FEE2E2','#991B1B'],
    'مكتمل':['#D1FAE5','#065F46'], 'مسودة':['#F3F4F6','#6B7280'],
    'صحي':['#D1FAE5','#065F46'], 'منخفض':['#FEF3C7','#92400E'], 'نفذ':['#FEE2E2','#991B1B'],
    'مدفوع':['#D1FAE5','#065F46'], 'قيد الانتظار':['#FEF3C7','#92400E'],
    'قيد المراجعة':['#FEF3C7','#92400E'], 'مرفوض':['#FEE2E2','#991B1B'],
  };
  const [bg,color] = map[status] || ['#F3F4F6','#6B7280'];
  return <span style={{background:bg,color,borderRadius:999,fontSize:11,fontWeight:700,padding:'3px 10px'}}>{status}</span>;
}

function Btn({ children, variant='primary', small, onClick, icon }) {
  const s = {
    primary:{background:grad,color:'#fff',border:'none',boxShadow:'0 4px 14px rgba(212,83,126,0.2)'},
    secondary:{background:'#fff',color:C.text,border:`1.5px solid ${C.border}`},
    ghost:{background:'transparent',color:C.purple,border:'none'},
    danger:{background:'#FEE2E2',color:'#991B1B',border:'none'},
  };
  return <button onClick={onClick} style={{...s[variant],borderRadius:9,height:small?32:38,padding:`0 ${small?12:16}px`,fontSize:small?12:13,fontWeight:700,fontFamily:'Cairo,sans-serif',cursor:'pointer',whiteSpace:'nowrap',display:'inline-flex',alignItems:'center',gap:6}}>
    {icon && <Icon name={icon} size={small?14:15}/>}{children}
  </button>;
}

function Input({ placeholder, style, value, onChange, type='text' }) {
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{height:38,border:`1.5px solid ${C.border}`,borderRadius:9,padding:'0 12px',fontSize:13,outline:'none',color:C.text,background:'#fff',...style}} />;
}

function Table({ cols, rows }) {
  return (
    <div style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#FAFAFA'}}>
          {cols.map(c => <th key={c} style={{padding:'11px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:C.text2,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>{c}</th>)}
        </tr></thead>
        <tbody>
          {rows.map((row,i) => (
            <tr key={i} style={{borderBottom:'1px solid #F9F9F9'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFA'} onMouseLeave={e=>e.currentTarget.style.background=''}>
              {row.map((cell,j) => <td key={j} style={{padding:'12px 14px',fontSize:13,color:C.text,verticalAlign:'middle'}}>{cell}</td>)}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Banner Store (shared with the website via localStorage) ───────────
const DEFAULT_BANNERS = [
  { id:'b1', img:'https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1600&q=80&fit=crop',
    eyebrowAr:'المنصة الأولى للتسوق عبر المؤثرين', eyebrowEn:'#1 INFLUENCER MARKETPLACE',
    titleAr:'اكتشف\nتسوق بثقة', titleEn:'Discover.\nShop Smart.',
    subAr:'منتجات مختارة بعناية من مؤثرين موثوقين في الأزياء والجمال والتكنولوجيا.',
    subEn:'Curated products from trusted influencers in fashion, beauty, and tech.',
    ctaAr:'تسوق الآن', ctaEn:'Shop Now', href:'listing', tint:'rgba(26,26,46,0.7)', active:true },
  { id:'b2', img:'https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=1600&q=80&fit=crop',
    eyebrowAr:'مجموعة رمضان', eyebrowEn:'RAMADAN COLLECTION',
    titleAr:'أناقة\nتُحاكي التراث', titleEn:'Heritage,\nreimagined.',
    subAr:'أزياء وعطور وهدايا من أفخر العلامات السعودية، بخصم حتى ٤٠٪.',
    subEn:'Fashion, fragrance and gifts from Saudi\'s finest brands — up to 40% off.',
    ctaAr:'اكتشف المجموعة', ctaEn:'Explore Collection', href:'listing', tint:'rgba(127,119,221,0.55)', active:true },
  { id:'b3', img:'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80&fit=crop',
    eyebrowAr:'إطلاق حصري', eyebrowEn:'EXCLUSIVE DROP',
    titleAr:'جديد من\nالمؤثرين', titleEn:'New from\nyour favourites.',
    subAr:'إطلاقات محدودة العدد — قبل أن تنفد.',
    subEn:'Limited drops curated by top creators — before they\'re gone.',
    ctaAr:'شاهد الآن', ctaEn:'Shop Drops', href:'influencer', tint:'rgba(212,83,126,0.5)', active:true },
];
function loadBanners(){ try { const s=JSON.parse(localStorage.getItem('souk.banners')); if(Array.isArray(s)&&s.length) return s; } catch(e){} return DEFAULT_BANNERS; }
function saveBanners(b){ localStorage.setItem('souk.banners', JSON.stringify(b)); window.dispatchEvent(new Event('souk-banners-changed')); }

// ── BannerManager screen ────────────────────────────────
function BannerManagerScreen() {
  const [banners, setBanners] = React.useState(loadBanners);
  const [editing, setEditing] = React.useState(null); // banner object or null
  const [isNew, setIsNew] = React.useState(false);

  const persist = (next) => { setBanners(next); saveBanners(next); };
  const addNew = () => {
    setIsNew(true);
    setEditing({ id:'b'+Date.now(), img:'https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1600&q=80&fit=crop',
      eyebrowAr:'عرض جديد', eyebrowEn:'NEW OFFER', titleAr:'اكتب العنوان هنا', titleEn:'Your headline here',
      subAr:'وصف قصير للبنر', subEn:'Short description for the banner', ctaAr:'اكتشف', ctaEn:'Explore',
      href:'listing', tint:'rgba(26,26,46,0.6)', active:true });
  };
  const saveEdit = () => {
    if (isNew) persist([...banners, editing]);
    else persist(banners.map(b=>b.id===editing.id?editing:b));
    setEditing(null); setIsNew(false);
  };
  const remove = (id) => persist(banners.filter(b=>b.id!==id));
  const toggle = (id) => persist(banners.map(b=>b.id===id?{...b,active:!b.active}:b));
  const move = (idx, dir) => {
    const j = idx + dir; if (j<0 || j>=banners.length) return;
    const next = [...banners]; [next[idx],next[j]] = [next[j],next[idx]];
    persist(next);
  };
  const resetDefault = () => { if (confirm('إعادة تعيين البنرات إلى الافتراضي؟')) persist(DEFAULT_BANNERS); };

  const field = (label, key, long) => (
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:C.text2,marginBottom:5,textTransform:'uppercase',letterSpacing:'0.04em'}}>{label}</div>
      {long
        ? <textarea value={editing[key]||''} onChange={e=>setEditing({...editing,[key]:e.target.value})} style={{width:'100%',minHeight:60,border:`1.5px solid ${C.border}`,borderRadius:9,padding:10,fontSize:13,fontFamily:'Cairo,sans-serif',outline:'none',resize:'vertical'}}/>
        : <Input value={editing[key]||''} onChange={e=>setEditing({...editing,[key]:e.target.value})} style={{width:'100%'}}/>}
    </div>
  );

  return (
    <div style={{padding:24,maxWidth:1200}}>
      <div style={{background:'linear-gradient(135deg,rgba(127,119,221,0.08),rgba(212,83,126,0.08))',borderRadius:14,padding:'16px 20px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',border:'1px solid rgba(127,119,221,0.2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:42,height:42,borderRadius:11,background:grad,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><Icon name="banner" size={22}/></div>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:C.text}}>إدارة البنرات الإعلانية للموقع</div>
            <div style={{fontSize:12,color:C.text2,marginTop:2}}>يتم عرض البنرات النشطة فقط في الصفحة الرئيسية للموقع ضمن عرض شرائح تلقائي.</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <Btn variant="secondary" small onClick={resetDefault} icon="refresh">إعادة تعيين</Btn>
          <Btn onClick={addNew} icon="plus">بنر جديد</Btn>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(380px,1fr))',gap:18}}>
        {banners.map((b,i)=>(
          <div key={b.id} style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden',opacity:b.active?1:0.55}}>
            <div style={{position:'relative',height:180,background:'#1A1A2E'}}>
              <img src={b.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              <div style={{position:'absolute',inset:0,background:`linear-gradient(to left,transparent,${b.tint||'rgba(26,26,46,0.7)'})`}}/>
              <div style={{position:'absolute',inset:0,padding:16,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
                <div style={{fontSize:10,fontWeight:800,color:'#fff',marginBottom:4,letterSpacing:'0.06em',opacity:0.9}}>{b.eyebrowAr}</div>
                <div style={{fontSize:18,fontWeight:900,color:'#fff',lineHeight:1.2,whiteSpace:'pre-line'}}>{b.titleAr}</div>
              </div>
              <div style={{position:'absolute',top:10,right:10,background:b.active?'rgba(29,158,117,0.9)':'rgba(107,114,128,0.9)',color:'#fff',borderRadius:999,fontSize:10,fontWeight:700,padding:'3px 9px',backdropFilter:'blur(6px)'}}>
                {b.active?'نشط':'موقوف'}
              </div>
              <div style={{position:'absolute',top:10,left:10,background:'rgba(0,0,0,0.5)',color:'#fff',borderRadius:999,fontSize:10,fontWeight:700,padding:'3px 9px',backdropFilter:'blur(6px)'}}>#{i+1}</div>
            </div>
            <div style={{padding:'12px 14px'}}>
              <div style={{fontSize:12,color:C.text2,marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
                <Icon name="link" size={13}/> {b.href||'—'}
                <span style={{marginRight:'auto',color:C.text3,fontSize:11}}>{b.ctaAr}</span>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <Btn small variant="secondary" icon="edit" onClick={()=>{setIsNew(false);setEditing(b);}}>تعديل</Btn>
                <Btn small variant="secondary" icon={b.active?'eyeOff':'eye'} onClick={()=>toggle(b.id)}>{b.active?'إيقاف':'تفعيل'}</Btn>
                <button onClick={()=>move(i,-1)} disabled={i===0} style={{background:'#F5F5F5',border:'none',borderRadius:8,width:32,height:32,cursor:i===0?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.text2,opacity:i===0?0.3:1}}><Icon name="chevronUp" size={15}/></button>
                <button onClick={()=>move(i,1)} disabled={i===banners.length-1} style={{background:'#F5F5F5',border:'none',borderRadius:8,width:32,height:32,cursor:i===banners.length-1?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.text2,opacity:i===banners.length-1?0.3:1}}><Icon name="chevronDown" size={15}/></button>
                <div style={{marginRight:'auto'}}>
                  <Btn small variant="danger" icon="trash" onClick={()=>{if(confirm('حذف هذا البنر؟'))remove(b.id);}}>حذف</Btn>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {editing && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}} onClick={()=>{setEditing(null);setIsNew(false);}}>
          <div style={{background:'#fff',borderRadius:18,width:720,maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'18px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontSize:17,fontWeight:800}}>{isNew?'بنر إعلاني جديد':'تعديل البنر'}</div>
              <button onClick={()=>{setEditing(null);setIsNew(false);}} style={{background:'#F5F5F5',border:'none',borderRadius:8,width:34,height:34,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.text2}}><Icon name="close" size={16}/></button>
            </div>
            <div style={{padding:22,overflowY:'auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:22}}>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:C.purple,marginBottom:10,letterSpacing:'0.08em'}}>المحتوى العربي</div>
                {field('العنوان الصغير','eyebrowAr')}
                {field('العنوان الرئيسي (سطرين مسموح)','titleAr',true)}
                {field('الوصف','subAr',true)}
                {field('نص الزر','ctaAr')}
                <div style={{fontSize:11,fontWeight:800,color:C.purple,margin:'20px 0 10px',letterSpacing:'0.08em'}}>ENGLISH CONTENT</div>
                {field('Eyebrow','eyebrowEn')}
                {field('Title (2 lines ok)','titleEn',true)}
                {field('Description','subEn',true)}
                {field('Button text','ctaEn')}
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:C.purple,marginBottom:10,letterSpacing:'0.08em'}}>الإعدادات البصرية</div>
                {field('رابط الصورة (URL)','img')}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.text2,marginBottom:5,textTransform:'uppercase',letterSpacing:'0.04em'}}>معاينة</div>
                  <div style={{height:140,borderRadius:10,overflow:'hidden',position:'relative',background:'#1A1A2E',border:`1px solid ${C.border}`}}>
                    <img src={editing.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    <div style={{position:'absolute',inset:0,background:`linear-gradient(to left,transparent,${editing.tint||'rgba(26,26,46,0.7)'})`}}/>
                    <div style={{position:'absolute',inset:0,padding:14,display:'flex',flexDirection:'column',justifyContent:'center'}}>
                      <div style={{fontSize:9,fontWeight:800,color:'#fff',marginBottom:4,letterSpacing:'0.06em'}}>{editing.eyebrowAr}</div>
                      <div style={{fontSize:16,fontWeight:900,color:'#fff',lineHeight:1.15,whiteSpace:'pre-line'}}>{editing.titleAr}</div>
                    </div>
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.text2,marginBottom:6,textTransform:'uppercase',letterSpacing:'0.04em'}}>لون الطبقة الداكنة</div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {[['rgba(26,26,46,0.7)','داكن'],['rgba(127,119,221,0.55)','بنفسجي'],['rgba(212,83,126,0.5)','وردي'],['rgba(200,168,75,0.55)','ذهبي'],['rgba(0,0,0,0.45)','أسود خفيف']].map(([v,l])=>(
                      <div key={v} onClick={()=>setEditing({...editing,tint:v})} style={{padding:'6px 12px',borderRadius:8,border:`1.5px solid ${editing.tint===v?C.purple:C.border}`,background:editing.tint===v?'#F5F0FF':'#fff',cursor:'pointer',fontSize:12,fontWeight:editing.tint===v?700:500,color:editing.tint===v?C.purple:C.text2}}>{l}</div>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:12}}>

    dashboard:<DashboardScreen/>, banners:<BannerManagerScreen/>, sellers:<SellersScreen/>,
    products:<ProductsScreen/>, orders:<OrdersScreen/>, finance:<FinanceScreen/>,
    promotions:<PromotionsScreen/>, inventory:<InventoryScreen/>, settings:<SettingsScreen/>
  };
  const titles = { dashboard:'لوحة التحكم', banners:'البنرات الإعلانية', sellers:'إدارة البائعين', products:'إدارة المنتجات', orders:'إدارة الطلبات', finance:'المالية والمدفوعات', promotions:'العروض والكوبونات', inventory:'مراقبة المخزون', settings:'الإعدادات' };
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar active={screen} onNav={setScreen}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={titles[screen]||''} />
        <div style={{flex:1,overflowY:'auto'}}>{screens[screen]||screens.dashboard}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
