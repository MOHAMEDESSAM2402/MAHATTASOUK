<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>سوق · Souk — تسوق مع المؤثرين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:#fff; color:#1A1A1A; min-height:100vh; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:#F5F5F5; }
::-webkit-scrollbar-thumb { background:#D1D5DB; border-radius:3px; }
img { display:block; }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../assets/icons.js"></script>
<script type="text/babel" src="WebData.jsx"></script>
<script type="text/babel" src="WebComponents.jsx"></script>
<script type="text/babel" src="WebPages.jsx"></script>
<script type="text/babel">
function App() {
  const saved = JSON.parse(localStorage.getItem('souk-web-state') || '{}');
  const [page, setPage]               = React.useState(saved.page || 'home');
  const [lang, setLang]               = React.useState(saved.lang || 'ar');
  const [selectedProduct, setProduct] = React.useState(null);
  const [selectedCat, setCat]         = React.useState(saved.cat || null);
  const [cart, setCart]               = React.useState(saved.cart || []);

  React.useEffect(() => {
    localStorage.setItem('souk-web-state', JSON.stringify({ page, lang, cat: selectedCat, cart }));
    document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
    document.documentElement.lang = lang;
  }, [page, lang, selectedCat, cart]);

  const onNav = (p) => { setPage(p); window.scrollTo(0,0); };

  const onProduct = (product) => {
    setProduct(product);
    setPage('product');
    window.scrollTo(0,0);
  };

  const onInfluencer = () => { setPage('influencer'); window.scrollTo(0,0); };

  const onCategory = (catId) => {
    setCat(catId);
    setPage('listing');
    window.scrollTo(0,0);
  };

  const addToCart = (product) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) return prev.map(i => i.id === product.id ? {...i, qty: i.qty+1} : i);
      return [...prev, {...product, qty:1}];
    });
    onNav('cart');
  };

  const pages = {
    home:       <HomePage      lang={lang} onProduct={onProduct} onInfluencer={onInfluencer} onNav={onNav} onCategory={onCategory} />,
    listing:    <ListingPage   lang={lang} onProduct={onProduct} selectedCat={selectedCat} setSelectedCat={setCat} />,
    product:    selectedProduct ? <ProductPage lang={lang} product={selectedProduct} onBack={()=>{ setPage(selectedProduct?'listing':'home'); }} addToCart={addToCart}/> : null,
    cart:       <CartPage      lang={lang} cart={cart} setCart={setCart} onCheckout={()=>onNav('home')} />,
    influencer: <InfluencerListPage lang={lang} onInfluencer={onInfluencer} onProduct={onProduct} />,
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <SiteHeader lang={lang} setLang={setLang} cartCount={cart.reduce((s,i)=>s+i.qty,0)} onNav={onNav} page={page}/>
      <main style={{flex:1}}>
        {pages[page] || pages.home}
      </main>
      <SiteFooter lang={lang}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
