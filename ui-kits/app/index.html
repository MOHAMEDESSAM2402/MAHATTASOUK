<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Souk App — Customer Mobile UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F0F1A; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 16px; font-family: 'Cairo', sans-serif; }
  .stage { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
  .phone { width: 375px; height: 720px; border-radius: 40px; overflow: hidden; background: #fff; box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08); position: relative; flex-shrink: 0; }
  .screen-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 10px; padding: 8px 16px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .screen-btn:hover { background: rgba(127,119,221,0.3); border-color: #7F77DD; }
  .screen-btn.active { background: linear-gradient(135deg,#7F77DD,#D4537E); border-color: transparent; }
  h1 { color: #fff; font-size: 22px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg,#7F77DD,#D4537E); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 24px; }
  .nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }
</style>
</head>
<body>
<h1>Souk · تطبيق العميل</h1>
<p>تطبيق تسوق متعدد البائعين · 375px · iOS/Android</p>
<div class="nav" id="nav"></div>
<div class="stage"><div class="phone" id="app-root"></div></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens1.jsx"></script>
<script type="text/babel" src="Screens2.jsx"></script>
<script type="text/babel">
const SCREENS = [
  { id: 'home', label: 'الرئيسية' },
  { id: 'influencer', label: 'المؤثر' },
  { id: 'product', label: 'المنتج' },
  { id: 'cart', label: 'السلة' },
  { id: 'checkout', label: 'الدفع' },
  { id: 'success', label: 'تأكيد الطلب' },
  { id: 'tracking', label: 'تتبع الطلب' },
  { id: 'profile', label: 'حسابي' },
];

function App() {
  const saved = localStorage.getItem('souk-app-screen');
  const [screen, setScreen] = React.useState(saved || 'home');
  const [selectedProduct, setSelectedProduct] = React.useState(null);
  const [selectedInfluencer, setSelectedInfluencer] = React.useState(null);

  React.useEffect(() => {
    localStorage.setItem('souk-app-screen', screen);
    // Update nav buttons
    document.querySelectorAll('.screen-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.screen === screen);
    });
  }, [screen]);

  const go = (s) => setScreen(s);

  const screens = {
    home: <HomeScreen onNav={go} onProduct={p => { setSelectedProduct(p); go('product'); }} onInfluencer={inf => { setSelectedInfluencer(inf); go('influencer'); }} />,
    influencer: <InfluencerScreen influencer={selectedInfluencer} onBack={() => go('home')} onProduct={p => { setSelectedProduct(p); go('product'); }} />,
    product: <ProductScreen product={selectedProduct} onBack={() => go('home')} onCart={() => go('cart')} />,
    cart: <CartScreen onBack={() => go('home')} onCheckout={() => go('checkout')} />,
    checkout: <CheckoutScreen onBack={() => go('cart')} onSuccess={() => go('success')} />,
    success: <OrderSuccessScreen onHome={() => go('home')} onTrack={() => go('tracking')} />,
    tracking: <OrderTrackingScreen onBack={() => go('success')} />,
    profile: <ProfileScreen onNav={go} />,
  };

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
      {screens[screen] || screens.home}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);

// Build nav buttons
const nav = document.getElementById('nav');
SCREENS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'screen-btn' + (s.id === (localStorage.getItem('souk-app-screen') || 'home') ? ' active' : '');
  btn.dataset.screen = s.id;
  btn.textContent = s.label;
  btn.onclick = () => {
    // Trigger screen change via React by clicking — we use a global bridge
    window.__soukGoTo && window.__soukGoTo(s.id);
  };
  nav.appendChild(btn);
});
</script>
<script type="text/babel">
// Bridge for nav buttons
function setupBridge() {
  // Re-render with forced screen from nav
  const root = document.getElementById('app-root');
  window.__soukGoTo = (screenId) => {
    localStorage.setItem('souk-app-screen', screenId);
    location.reload();
  };
}
setupBridge();
</script>
</body>
</html>
