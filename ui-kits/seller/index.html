<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Souk Seller Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../assets/icons.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:#F5F5F5; direction:rtl; min-height:100vh; }
input, select, textarea { font-family:inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = { purple:'#7F77DD', pink:'#D4537E', text:'#1A1A1A', text2:'#6B7280', text3:'#9CA3AF', border:'#E5E7EB', success:'#1D9E75', warning:'#F59E0B', error:'#E24B4A' };
const grad = 'linear-gradient(135deg,#7F77DD,#D4537E)';

function Sidebar({ active, onNav }) {
  const items = [
    { id:'dashboard', icon:'grid',   label:'الرئيسية' },
    { id:'products',  icon:'box',    label:'منتجاتي' },
    { id:'orders',    icon:'receipt',label:'الطلبات' },
    { id:'inventory', icon:'chart',  label:'المخزون' },
    { id:'earnings',  icon:'wallet', label:'الأرباح' },
  ];
  return (
    <div style={{width:218,background:'#1A1A2E',height:'100vh',display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0}}>
      <div style={{padding:'20px 18px 14px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{fontSize:20,fontWeight:900,background:grad,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>سوق</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:2}}>لوحة البائع</div>
      </div>
      <div style={{padding:'12px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:40,height:40,borderRadius:999,background:grad,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0}}><Icon name="store" size={20}/></div>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:'#fff'}}>متجر الرياضة العالمي</div>
          <span style={{background:'rgba(127,119,221,0.3)',color:'#B4AFF2',borderRadius:999,fontSize:10,fontWeight:700,padding:'1px 7px'}}>تاجر موثق</span>
        </div>
      </div>
      <nav style={{flex:1,padding:'10px 10px'}}>
        {items.map(item=>(
          <div key={item.id} onClick={()=>onNav(item.id)} style={{display:'flex',alignItems:'center',gap:11,padding:'10px 12px',borderRadius:10,cursor:'pointer',marginBottom:2,background:active===item.id?'rgba(127,119,221,0.22)':'transparent',color:active===item.id?'#B4AFF2':'rgba(255,255,255,0.65)'}}>
            <Icon name={item.icon} size={18}/>
            <span style={{fontSize:13,fontWeight:active===item.id?700:500}}>{item.label}</span>
          </div>
        ))}
      </nav>
      <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,0.08)',fontSize:12,color:'rgba(255,255,255,0.4)'}}>sports@store.sa</div>
    </div>
  );
}

function TopBar({ title }) {
  return (
    <div style={{height:56,background:'#fff',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',flexShrink:0}}>
      <div style={{fontSize:16,fontWeight:800,color:C.text}}>{title}</div>
      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        <button style={{background:'#FFF0F5',border:'none',borderRadius:10,padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:700,color:C.pink,fontFamily:'Cairo,sans-serif',display:'inline-flex',alignItems:'center',gap:6}}><Icon name="bell" size={15}/> ٥ طلبات جديدة</button>
      </div>
    </div>
  );
}

function KpiCard({ label, value, sub, icon, highlight }) {
  return (
    <div style={{background:highlight?grad:'#fff',borderRadius:14,border:highlight?'none':`1px solid ${C.border}`,padding:'16px 18px',flex:1,boxShadow:highlight?'0 8px 24px rgba(212,83,126,0.25)':'none'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div style={{fontSize:12,color:highlight?'rgba(255,255,255,0.85)':C.text2,fontWeight:600}}>{label}</div>
        <div style={{width:34,height:34,borderRadius:9,background:highlight?'rgba(255,255,255,0.2)':'linear-gradient(135deg,rgba(127,119,221,0.12),rgba(212,83,126,0.12))',display:'flex',alignItems:'center',justifyContent:'center',color:highlight?'#fff':C.purple}}><Icon name={icon} size={17}/></div>
      </div>
      <div style={{fontSize:24,fontWeight:900,color:highlight?'#fff':C.text,lineHeight:1}}>{value}</div>
      {sub && <div style={{fontSize:11,color:highlight?'rgba(255,255,255,0.8)':C.text3,marginTop:6}}>{sub}</div>}
    </div>
  );
}

function StatusBadge({ status }) {
  const map = {'جديد':['#EDE9FE','#5B21B6'],'قيد المعالجة':['#DBEAFE','#1E40AF'],'مشحون':['#D1FAE5','#065F46'],'مكتمل':['#D1FAE5','#065F46'],'ملغي':['#FEE2E2','#991B1B'],'صحي':['#D1FAE5','#065F46'],'منخفض':['#FEF3C7','#92400E'],'نفذ':['#FEE2E2','#991B1B'],'نشط':['#D1FAE5','#065F46'],'قيد المراجعة':['#FEF3C7','#92400E'],'معلق':['#FEF3C7','#92400E'],'مدفوع':['#D1FAE5','#065F46']};
  const [bg,color] = map[status]||['#F3F4F6','#6B7280'];
  return <span style={{background:bg,color,borderRadius:999,fontSize:11,fontWeight:700,padding:'3px 10px'}}>{status}</span>;
}

function Btn({ children, variant='primary', small, full, onClick, icon }) {
  const s = { primary:{background:grad,color:'#fff',border:'none'}, secondary:{background:'#fff',color:C.text,border:`1.5px solid ${C.border}`}, ghost:{background:'#F5F0FF',color:C.purple,border:'none'} };
  return <button onClick={onClick} style={{...s[variant],borderRadius:9,height:small?32:38,padding:`0 ${small?12:16}px`,fontSize:small?12:13,fontWeight:700,fontFamily:'Cairo,sans-serif',cursor:'pointer',width:full?'100%':'auto',whiteSpace:'nowrap',display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}}>
    {icon && <Icon name={icon} size={small?13:15}/>}{children}
  </button>;
}

function Table({ cols, rows }) {
  return (
    <div style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#FAFAFA'}}>{cols.map(c=><th key={c} style={{padding:'11px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:C.text2,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>{c}</th>)}</tr></thead>
        <tbody>{rows.map((row,i)=><tr key={i} style={{borderBottom:'1px solid #F9F9F9'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFAFA'} onMouseLeave={e=>e.currentTarget.style.background=''}>{row.map((cell,j)=><td key={j} style={{padding:'12px 14px',fontSize:13,color:C.text,verticalAlign:'middle'}}>{cell}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
}

// Real product images (Unsplash)
const IMG = {
  shoe: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200&q=80&fit=crop',
  watch:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&q=80&fit=crop',
  socks:'https://images.unsplash.com/photo-1586350977771-2a1dba2e9ae9?w=200&q=80&fit=crop',
};
const Thumb = ({src}) => <img src={src} alt="" style={{width:42,height:42,borderRadius:8,objectFit:'cover',background:'#F5F5F5'}}/>;

function DashboardScreen() {
  const topProducts = [[IMG.shoe,'حذاء نايك Air Max','١٢٠ ر.س','٤٨'],[IMG.watch,'ساعة ذكية','٤٥٠ ر.س','٣٢'],[IMG.socks,'جوارب رياضية','٢٥ ر.س','٩٦']];
  const recentOrders = [
    ['#٨٨٤٢','أحمد · الرياض','حذاء نايك','٢١٠ ر.س',<Icon name="wallet" size={15} style={{color:C.purple}}/>,<StatusBadge status="مشحون"/>,'قبل ٣٥ د',<span style={{fontSize:12,color:C.text3}}>—</span>],
    ['#٨٨٤١','سارة · جدة','جوارب ×٣','٧٥ ر.س',<Icon name="wallet" size={15} style={{color:C.success}}/>,<StatusBadge status="قيد المعالجة"/>,'قبل ساعة',<Btn small variant="secondary" icon="truck">شحن</Btn>],
  ];
  return (
    <div style={{padding:24}}>
      <div style={{background:'linear-gradient(135deg,#FFFBEB,#FFF5F5)',borderRadius:14,padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',border:'1px solid rgba(245,158,11,0.25)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:40,height:40,borderRadius:10,background:'#FEF3C7',display:'flex',alignItems:'center',justifyContent:'center',color:'#92400E'}}><Icon name="chart" size={20}/></div>
          <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>٢ منتجات بمخزون منخفض و١ نفذ مخزونه</div><div style={{fontSize:12,color:C.text2}}>يُرجى تحديث الكميات لتجنب خسارة المبيعات</div></div>
        </div>
        <Btn icon="refresh">تحديث المخزون</Btn>
      </div>
      <div style={{display:'flex',gap:14,marginBottom:20}}>
        <KpiCard label="الإيرادات (الشهر)" value="٤٨,٣٢٠ ر.س" sub="↑ +١٢٪ عن الشهر الماضي" icon="wallet"/>
        <KpiCard label="الطلبات" value="٢٣٧" sub="٥ اليوم" icon="receipt"/>
        <KpiCard label="المنتجات" value="١٢٩" sub="٣ مخزون منخفض" icon="box"/>
        <KpiCard label="دفعة معلقة" value="١٢,٤٠٠ ر.س" sub="موعد: ١ ديسمبر" icon="clock" highlight/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:16,marginBottom:20}}>
        <div style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,padding:'18px 20px'}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>اتجاه المبيعات</div>
          <div style={{height:130,display:'flex',alignItems:'flex-end',gap:3,padding:'0 4px'}}>
            {[55,72,48,85,65,90,80,95,70,88,92,76,98,84,100].map((h,i)=>(
              <div key={i} style={{flex:1,height:`${h}%`,background:i===14?grad:`rgba(127,119,221,${0.15+h/400})`,borderRadius:'3px 3px 0 0'}}/>
            ))}
          </div>
        </div>
        <div style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,padding:'18px 20px'}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>أفضل المنتجات</div>
          {topProducts.map(([src,name,price,sales],i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <img src={src} alt="" style={{width:32,height:32,borderRadius:7,objectFit:'cover'}}/>
              <span style={{flex:1,fontSize:12,fontWeight:600}}>{name}</span>
              <span style={{fontSize:12,color:C.purple,fontWeight:700}}>{sales} مبيعة</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{marginBottom:10,fontSize:14,fontWeight:700}}>أحدث الطلبات</div>
      <Table cols={['رقم الطلب','العميل','المنتجات','الإجمالي','الدفع','الحالة','الوقت','']} rows={recentOrders}/>
    </div>
  );
}

function ProductsScreen() {
  const [showModal, setShowModal] = React.useState(false);
  const products = [
    [<div style={{display:'flex',alignItems:'center',gap:10}}><Thumb src={IMG.shoe}/><div><div style={{fontSize:13,fontWeight:700}}>حذاء نايك Air Max</div><div style={{fontSize:11,color:C.text2}}>SKU-٠٠١ · ٣ متغيرات</div></div></div>,'SKU-٠٠١','١٢٠ ر.س',<div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:60,height:6,borderRadius:3,background:'#E5E7EB',overflow:'hidden'}}><div style={{width:'70%',height:'100%',background:C.success}}/></div><span style={{fontSize:11,color:C.success,fontWeight:700}}>٣٢</span></div>,'١٢٤',<StatusBadge status="نشط"/>,<div style={{display:'flex',gap:5}}><Btn small variant="secondary" icon="edit">تعديل</Btn></div>],
    [<div style={{display:'flex',alignItems:'center',gap:10}}><Thumb src={IMG.watch}/><div><div style={{fontSize:13,fontWeight:700}}>ساعة ذكية</div><div style={{fontSize:11,color:C.text2}}>SKU-٠٠٢ · ٢ متغيرات</div></div></div>,'SKU-٠٠٢','٤٥٠ ر.س',<div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:60,height:6,borderRadius:3,background:'#E5E7EB',overflow:'hidden'}}><div style={{width:'15%',height:'100%',background:C.warning}}/></div><span style={{fontSize:11,color:C.warning,fontWeight:700}}>٤</span></div>,'٨٩',<StatusBadge status="قيد المراجعة"/>,<span style={{fontSize:11,color:C.warning,fontWeight:600,display:'inline-flex',alignItems:'center',gap:4}}><Icon name="clock" size={13}/> بانتظار الإدارة</span>],
    [<div style={{display:'flex',alignItems:'center',gap:10}}><Thumb src={IMG.socks}/><div><div style={{fontSize:13,fontWeight:700}}>جوارب رياضية</div><div style={{fontSize:11,color:C.text2}}>SKU-٠٠٣ · ٤ متغيرات</div></div></div>,'SKU-٠٠٣','٢٥ ر.س',<div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:60,height:6,borderRadius:3,background:'#E5E7EB',overflow:'hidden'}}><div style={{width:'90%',height:'100%',background:C.success}}/></div><span style={{fontSize:11,color:C.success,fontWeight:700}}>٢٤٠</span></div>,'٣١٢',<StatusBadge status="نشط"/>,<Btn small variant="secondary" icon="edit">تعديل</Btn>],
  ];
  return (
    <div style={{padding:24}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:16,alignItems:'center'}}>
        <input placeholder="بحث..." style={{height:38,border:`1.5px solid ${C.border}`,borderRadius:9,padding:'0 12px',fontSize:13,outline:'none',width:220,fontFamily:'Cairo,sans-serif'}}/>
        <Btn onClick={()=>setShowModal(true)} icon="plus">إضافة منتج</Btn>
      </div>
      <Table cols={['المنتج','SKU','السعر','المخزون','المبيعات','الحالة','الإجراءات']} rows={products}/>
      {showModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={()=>setShowModal(false)}>
          <div style={{background:'#fff',borderRadius:20,padding:28,width:480,maxHeight:'85vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:14}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:800}}>إضافة منتج جديد</div>
            {[['اسم المنتج'],['السعر (ر.س)'],['سعر المقارنة (ر.س)'],['الفئة'],['SKU'],['المخزون الأولي']].map(([l])=>(
              <div key={l}><div style={{fontSize:12,fontWeight:700,color:C.text2,marginBottom:4}}>{l}</div><input placeholder="" style={{width:'100%',height:38,border:`1.5px solid ${C.border}`,borderRadius:9,padding:'0 12px',fontSize:13,outline:'none',fontFamily:'Cairo,sans-serif'}}/></div>
            ))}
            <div style={{border:'2px dashed #E5E7EB',borderRadius:12,padding:20,textAlign:'center',color:C.text3,fontSize:13,display:'flex',flexDirection:'column',alignItems:'center',gap:8}}><Icon name="upload" size={24}/>رفع صور المنتج (السحب والإفلات)</div>
            <div style={{background:'#FFFBEB',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#92400E',lineHeight:1.6,display:'flex',alignItems:'center',gap:8}}><Icon name="shield" size={14}/>سيتم مراجعة المنتج من قِبل فريق الإدارة قبل نشره في المتجر.</div>
            <div style={{display:'flex',gap:10}}>
              <Btn full onClick={()=>setShowModal(false)} icon="check">إرسال للمراجعة</Btn>
              <Btn variant="secondary" onClick={()=>setShowModal(false)}>مسودة</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function OrdersScreen() {
  const [tab, setTab] = React.useState('new');
  const tabs = [['all','الكل','٢٣٧'],['new','جديد','٥'],['processing','قيد المعالجة','١٢'],['shipped','مشحون','٤٨'],['delivered','مكتمل','١٧٢']];
  const orders = [
    ['#٨٨٤٢','أحمد العنزي · الرياض','حذاء نايك L أسود','٢١٠ ر.س',<Icon name="wallet" size={15} style={{color:C.purple}}/>,<StatusBadge status="مشحون"/>,'منذ ٣٥ د'],
    ['#٨٨٣٧','فاطمة الدوسري · جدة','جوارب ×٣','٧٥ ر.س',<Icon name="wallet" size={15} style={{color:C.success}}/>,<StatusBadge status="قيد المعالجة"/>,'منذ ٣ س'],
    ['#٨٨٣٢','عبدالله السلمي · الدمام','ساعة ذكية','٤٥٠ ر.س',<Icon name="wallet" size={15} style={{color:C.purple}}/>,<StatusBadge status="مكتمل"/>,'أمس'],
  ];
  return (
    <div style={{padding:24}}>
      <div style={{display:'flex',borderBottom:`1px solid ${C.border}`,marginBottom:20,gap:2}}>
        {tabs.map(([id,label,count])=>(
          <div key={id} onClick={()=>setTab(id)} style={{padding:'9px 14px',cursor:'pointer',fontSize:13,fontWeight:tab===id?700:500,color:tab===id?C.purple:C.text2,borderBottom:`2px solid ${tab===id?C.purple:'transparent'}`,display:'flex',alignItems:'center',gap:4}}>
            {label}<span style={{background:tab===id?'#F5F0FF':'#F3F4F6',color:tab===id?C.purple:C.text3,borderRadius:999,fontSize:10,fontWeight:700,padding:'1px 6px'}}>{count}</span>
          </div>
        ))}
      </div>
      <div style={{background:'#F5F0FF',borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:13,color:C.purple,fontWeight:600,display:'flex',alignItems:'center',gap:8}}><Icon name="shield" size={15}/>معالجة الطلبات وشحنها تتم من قِبل فريق إدارة المنصة.</div>
      <Table cols={['رقم الطلب','العميل','المنتجات','الإجمالي','الدفع','الحالة','الوقت']} rows={orders}/>
    </div>
  );
}

function InventoryScreen() {
  const [items, setItems] = React.useState([
    {id:1, img:IMG.shoe, name:'حذاء نايك — أسود L', sku:'SKU-001-BLK-L', stock:32, reserved:8, status:'صحي'},
    {id:2, img:IMG.shoe, name:'حذاء نايك — أبيض M', sku:'SKU-001-WHT-M', stock:4, reserved:1, status:'منخفض'},
    {id:3, img:IMG.watch, name:'ساعة ذكية — أسود', sku:'SKU-002-BLK', stock:0, reserved:0, status:'نفذ'},
    {id:4, img:IMG.socks, name:'جوارب — أبيض', sku:'SKU-003-WHT', stock:240, reserved:12, status:'صحي'},
    {id:5, img:IMG.socks, name:'جوارب — رمادي', sku:'SKU-003-GRY', stock:8, reserved:2, status:'منخفض'},
  ]);
  const [changed, setChanged] = React.useState(false);
  const update = (id, val) => { setItems(items.map(i=>i.id===id?{...i,stock:Math.max(0,parseInt(val)||0)}:i)); setChanged(true); };
  return (
    <div style={{padding:24}}>
      <div style={{display:'flex',gap:14,marginBottom:20}}>
        {[['إجمالي SKUs','٥','box'],['مخزون منخفض','٢','chart'],['نفذ المخزون','١','close']].map(([l,v,ic])=>(
          <div key={l} style={{background:'#fff',borderRadius:12,border:`1px solid ${C.border}`,padding:'14px 18px',flex:1,display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:'linear-gradient(135deg,rgba(127,119,221,0.12),rgba(212,83,126,0.12))',display:'flex',alignItems:'center',justifyContent:'center',color:C.purple}}><Icon name={ic} size={20}/></div>
            <div><div style={{fontSize:22,fontWeight:900,color:C.text}}>{v}</div><div style={{fontSize:12,color:C.text2}}>{l}</div></div>
          </div>
        ))}
      </div>
      <div style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden',marginBottom:16}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#FAFAFA'}}>{['المنتج','SKU','المخزون','المحجوز','المتاح','الحالة'].map(c=><th key={c} style={{padding:'11px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:C.text2,borderBottom:`1px solid ${C.border}`}}>{c}</th>)}</tr></thead>
          <tbody>
            {items.map(item=>(
              <tr key={item.id} style={{borderBottom:'1px solid #F9F9F9',background:item.status==='نفذ'?'#FFF5F5':item.status==='منخفض'?'#FFFBEB':''}}>
                <td style={{padding:'10px 14px'}}><div style={{display:'flex',alignItems:'center',gap:10}}><Thumb src={item.img}/><span style={{fontSize:13,fontWeight:600}}>{item.name}</span></div></td>
                <td style={{padding:'10px 14px',fontSize:12,color:C.text2,fontFamily:'monospace'}}>{item.sku}</td>
                <td style={{padding:'8px 14px'}}><input type="number" value={item.stock} onChange={e=>update(item.id,e.target.value)} style={{width:70,height:32,border:`1.5px solid ${C.border}`,borderRadius:7,padding:'0 8px',fontSize:13,outline:'none',textAlign:'center'}}/></td>
                <td style={{padding:'10px 14px',fontSize:13,color:C.text2}}>{item.reserved}</td>
                <td style={{padding:'10px 14px',fontSize:13,fontWeight:700,color:item.stock-item.reserved>0?C.success:C.error}}>{Math.max(0,item.stock-item.reserved)}</td>
                <td style={{padding:'10px 14px'}}><StatusBadge status={item.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {changed && <div style={{position:'sticky',bottom:16,display:'flex',justifyContent:'center'}}><Btn onClick={()=>setChanged(false)} icon="check">حفظ التغييرات</Btn></div>}
    </div>
  );
}

function EarningsScreen() {
  const payouts = [
    ['INV-٢٠٢٤-٠٨٣','نوفمبر ٢٠٢٤','٤٨,٣٢٠ ر.س',<StatusBadge status="مدفوع"/>,'١ نوفمبر',<Btn small variant="secondary" icon="download">تحميل</Btn>],
    ['INV-٢٠٢٤-٠٧٢','أكتوبر ٢٠٢٤','٤١,٨٠٠ ر.س',<StatusBadge status="مدفوع"/>,'١ أكتوبر',<Btn small variant="secondary" icon="download">تحميل</Btn>],
    ['INV-٢٠٢٤-٠٨٤','ديسمبر ٢٠٢٤','١٢,٤٠٠ ر.س',<StatusBadge status="معلق"/>,'١ ديسمبر','—'],
  ];
  return (
    <div style={{padding:24}}>
      <div style={{display:'flex',gap:14,marginBottom:20}}>
        <KpiCard label="إجمالي الأرباح" value="٢٤٠,٦٠٠ ر.س" sub="منذ الانضمام" icon="sparkles"/>
        <KpiCard label="هذا الشهر" value="٤٨,٣٢٠ ر.س" sub="↑ +١٢٪ عن الشهر الماضي" icon="chart"/>
        <KpiCard label="دفعة معلقة" value="١٢,٤٠٠ ر.س" sub="موعد: ١ ديسمبر ٢٠٢٤" icon="clock" highlight/>
      </div>
      <div style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,padding:20,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>تفاصيل الأرباح — نوفمبر ٢٠٢٤</div>
        {[['إجمالي المبيعات','٦٠,٤٠٠ ر.س',false],['عمولة المنصة (٢٠٪)','-١٢,٠٨٠ ر.س',true],['ضريبة القيمة المضافة','-١,٨١٢ ر.س',true]].map(([l,v,neg])=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #F0F0F0',fontSize:13}}>
            <span style={{color:C.text2}}>{l}</span>
            <span style={{fontWeight:700,color:neg?C.error:C.text}}>{v}</span>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',paddingTop:12,fontSize:16}}><span style={{fontWeight:800}}>صافي الأرباح</span><span style={{fontWeight:900,color:C.success}}>٤٦,٥٠٨ ر.س</span></div>
      </div>
      <div style={{marginBottom:10,fontSize:14,fontWeight:700}}>سجل المدفوعات</div>
      <Table cols={['رقم الفاتورة','الفترة','المبلغ','الحالة','تاريخ الدفع','']} rows={payouts}/>
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState(localStorage.getItem('souk-seller-screen')||'dashboard');
  React.useEffect(()=>{ localStorage.setItem('souk-seller-screen',screen); },[screen]);
  const screens = { dashboard:<DashboardScreen/>, products:<ProductsScreen/>, orders:<OrdersScreen/>, inventory:<InventoryScreen/>, earnings:<EarningsScreen/> };
  const titles = { dashboard:'لوحة التحكم', products:'منتجاتي', orders:'الطلبات', inventory:'إدارة المخزون', earnings:'الأرباح والمدفوعات' };
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar active={screen} onNav={setScreen}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={titles[screen]||''}/>
        <div style={{flex:1,overflowY:'auto'}}>{screens[screen]||screens.dashboard}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
